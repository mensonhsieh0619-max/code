<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教練端 | AI Health Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ea580c" />
    <script>
        if (localStorage.getItem("ai_health_platform_theme") === "dark") document.documentElement.dataset.theme = "dark";
    </script>
    <script>
        (function () {
            try {
                const s = JSON.parse(localStorage.getItem("ai_health_platform_login_state_v2") || "{}");
                if (s.loginAt && Date.now() - s.loginAt > 12 * 60 * 60 * 1000) { window.location.href = "index.html"; }
                if (!s.currentAccount && !s.demoMode) { window.location.href = "index.html"; }
                if (s.role !== "coach") { window.location.href = "index.html"; }
            } catch (e) { window.location.href = "index.html"; }
        })();
    </script>
</head>
<body class="page-body role-coach">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-brand" onclick="showSection('coach-dashboard-section')" style="cursor:pointer">
            <span class="nav-brand-icon">AI</span>
            <div>
                <div class="nav-brand-name">AI Health</div>
                <div class="nav-brand-sub">健身教練</div>
            </div>
        </div>
        <button class="nav-toggle" id="nav-toggle" onclick="toggleNavMenu()" aria-label="選單">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                <rect y="3" width="20" height="2" rx="1"/>
                <rect y="9" width="20" height="2" rx="1"/>
                <rect y="15" width="20" height="2" rx="1"/>
            </svg>
        </button>
        <div class="nav-menu" id="nav-menu">
            <button class="nav-btn" data-section="coach-dashboard-section" onclick="showSection('coach-dashboard-section')"><i class="bi bi-house-door-fill"></i> 首頁</button>
            <div class="nav-dropdown-wrap">
                <button class="nav-btn" onclick="toggleDropdown(this)"><i class="bi bi-people-fill"></i> 學員管理 <span class="nav-caret">▾</span></button>
                <div class="nav-dropdown">
                    <button class="nav-dropdown-item" data-section="student-list-section" onclick="showSection('student-list-section')"><i class="bi bi-list-ul"></i> 學員列表</button>
                    <button class="nav-dropdown-item" data-section="student-overview-section" onclick="showSection('student-overview-section')"><i class="bi bi-clipboard2-pulse"></i> 學員總覽</button>
                </div>
            </div>
            <button class="nav-btn" data-section="training-record-section" onclick="showSection('training-record-section')"><i class="bi bi-journal-text"></i> 訓練紀錄</button>
        </div>
        <div class="nav-right">
            <button class="nav-notif-btn dark-mode-toggle" onclick="toggleDarkMode()" title="切換深色模式" aria-label="切換深色模式" aria-pressed="false"><i class="bi bi-moon-stars-fill"></i></button>
            <button class="nav-notif-btn" onclick="showSection('notification-section')" title="通知" aria-label="通知">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="nav-notif-badge hidden" id="nav-notif-count-icon"></span>
            </button>
            <div class="nav-user-wrap" id="nav-user-wrap">
                <button class="nav-user-btn" onclick="toggleUserMenu()">
                    <span class="nav-user-avatar" id="nav-avatar">C</span>
                    <span id="nav-user-name">教練</span>
                    <span class="nav-caret">▾</span>
                </button>
                <div class="nav-user-menu">
                    <div class="nav-user-info">
                        <strong id="nav-full-name">李教練</strong>
                        <small id="nav-role-label">健身教練</small>
                    </div>
                    <hr />
                    <button class="logout-btn" onclick="logoutAccount()">登出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-content">
        <!-- Dashboard -->
        <section id="coach-dashboard-section" class="content-section active">
            <div class="role-hero">
                <div class="role-hero-text">
                    <p class="role-hero-eyebrow">歡迎回來</p>
                    <h2><span id="role-hero-name">教練</span>，準備好開始今天的訓練了嗎？</h2>
                    <p>掌握學員的運動達成率與心率趨勢，即時給予訓練建議。</p>
                </div>
                <div class="role-hero-media" aria-hidden="true">背景圖片預留位置</div>
            </div>
            <div id="coach-dashboard-cards" class="kpi-grid"></div>
            <div class="chart-row" style="margin-top:24px">
                <div class="chart-box" style="grid-column:1/-1">
                    <div class="chart-box-title">學員運動達成率（每週 150 分鐘目標）</div>
                    <canvas id="chart-coach-achievement" height="200" role="img" aria-label="學員運動達成率圖"></canvas>
                </div>
            </div>
            <div class="dashboard-panels" style="margin-top:24px">
                <div class="card">
                    <h3>趨勢摘要</h3>
                    <div id="coach-trend-summary"></div>
                </div>
                <div class="card">
                    <h3>AI 訓練建議摘要</h3>
                    <p class="disclaimer-note">AI 建議為規則式模擬展示，非真實教練意見。</p>
                    <div id="coach-ai-summary"></div>
                    <button class="secondary-button" onclick="showSection('student-overview-section')" style="margin-top:12px">查看完整建議</button>
                </div>
            </div>
        </section>

        <!-- Student List -->
        <section id="student-list-section" class="content-section">
            <h2 class="section-title">學員列表</h2>
            <div class="card table-card">
                <table>
                    <thead>
                        <tr><th>學員姓名</th><th>授權範圍</th><th>授權期限</th><th>狀態</th><th>操作</th></tr>
                    </thead>
                    <tbody id="student-list-body"></tbody>
                </table>
            </div>
        </section>

        <!-- Student Overview (合併：運動紀錄 + 心率趨勢 + AI 訓練建議) -->
        <section id="student-overview-section" class="content-section">
            <h2 class="section-title">學員總覽</h2>
            <p class="disclaimer-note">依授權範圍顯示，未授權欄位不顯示；AI 訓練建議為規則式模擬展示。</p>
            <div id="student-overview-panel"></div>
        </section>

        <!-- Training Record -->
        <section id="training-record-section" class="content-section">
            <h2 class="section-title">訓練紀錄</h2>
            <div class="card form-card">
                <h3>新增訓練紀錄</h3>
                <form onsubmit="addTrainingRecord(event)">
                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="training-student">學員姓名</label>
                            <input id="training-student" type="text" placeholder="學員姓名" required />
                        </div>
                        <div class="form-group">
                            <label for="training-title">訓練標題</label>
                            <input id="training-title" type="text" placeholder="本週訓練建議" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="training-content">訓練內容</label>
                        <textarea id="training-content" rows="3" placeholder="訓練計畫說明..." required></textarea>
                    </div>
                    <button type="submit" class="primary-button">新增紀錄</button>
                </form>
            </div>
            <div class="card" style="margin-top:16px">
                <h3>訓練紀錄列表</h3>
                <div id="training-record-list" class="record-list"></div>
            </div>
        </section>

        <!-- Notifications -->
        <section id="notification-section" class="content-section">
            <h2 class="section-title">通知中心</h2>
            <div class="card">
                <div id="notification-list" class="timeline"></div>
            </div>
        </section>
    </div>

    <div id="chart-tooltip" class="chart-tooltip"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="shared.js?v=20260710-role-rebuild"></script>
    <script>
        (async function () {
            await initDefaultAccounts();
            saveState();
            showSection("coach-dashboard-section");
        })();
    </script>
</body>
</html>
