        (async function () {

            saveState();
            const s = loadState();
            if ((s.currentAccount || s.demoMode) && s.role && s.role !== "guest") {
                const pages = { user: "app-user.html", coach: "app-coach.html", nutritionist: "app-nutrition.html", admin: "app-admin.html" };
                if (pages[s.role]) window.location.href = pages[s.role];
            }
        })();
    </script>
    <script>
        let deferredPWAInstallPrompt = null;

        function showPWAToast(message) {
            if (typeof showToast === "function") {
                showToast(message);
                return;
            }
            const toast = document.getElementById("toast");
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2800);
        }

        if (!window.__aiHealthNetworkStatusToast) {
            window.__aiHealthNetworkStatusToast = true;
            window.addEventListener("offline", () => {
                showPWAToast("目前為離線模式，仍可查看已快取資料。");
            });

            window.addEventListener("online", () => {
                showPWAToast("網路已恢復。");
            });
        }

        // Capture PWA installation prompt event
        window.addEventListener("beforeinstallprompt", (event) => {
            event.preventDefault();
            deferredPWAInstallPrompt = event;
            // Update button UI to indicate immediate installation is ready
            const btn = document.getElementById("pwa-direct-install-btn");
            if (btn) {
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="8 12 12 16 16 12"></polyline>
                        <line x1="12" y1="8" x2="12" y2="16"></line>
                    </svg>
                    立即安裝 PWA 隨身版
                `;
            }
        });

        async function handlePWADirectInstall(event) {
            if (deferredPWAInstallPrompt) {
                // If browser supports direct install prompt, intercept click and open install prompt directly!
                event.preventDefault();
                deferredPWAInstallPrompt.prompt();
                const { outcome } = await deferredPWAInstallPrompt.userChoice;
                console.log(`PWA install prompt choice: ${outcome}`);
                deferredPWAInstallPrompt = null;
            }
            // Otherwise, let the browser follow href="pwa.html" to show instructions
        }

        if (window.location.protocol !== "file:") {
            // Add manifest dynamically to prevent CORS error under file:// protocol
            const link = document.createElement("link");
            link.rel = "manifest";
            link.href = "manifest.json";
            document.head.appendChild(link);

            // Register Service Worker
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker.register("./service-worker.js")
                        .then(() => console.log("Service Worker registered"))
                        .catch(err => console.error("Service Worker registration failed:", err));
                });
            }
        } else {
            console.log("Running locally via file:// protocol. PWA manifest and service worker skipped to prevent browser CORS and origin errors.");
        }
    </script>
    <script>
        (function initAuthSlideSwipe() {
            const slider = document.getElementById("auth-slider");
            const track = document.getElementById("auth-slider-track");
            if (!slider || !track) return;

            let startX = 0;
            let startY = 0;
            let dragging = false;
            let isHorizontal = null;
            let activePointerId = null;

            const currentPercent = () => (track.dataset.activeTab === "register" ? -50 : 0);

            function onPointerDown(event) {
                if (event.pointerType === "mouse" && event.button !== 0) return;
                activePointerId = event.pointerId;
                startX = event.clientX;
                startY = event.clientY;
                dragging = true;
                isHorizontal = null;
                track.style.transition = "none";
            }

            function onPointerMove(event) {
                if (!dragging || event.pointerId !== activePointerId) return;
                const dx = event.clientX - startX;
                const dy = event.clientY - startY;
                if (isHorizontal === null) isHorizontal = Math.abs(dx) > Math.abs(dy) + 4;
                if (!isHorizontal) return;
                event.preventDefault();
                const percent = currentPercent() + (dx / slider.offsetWidth) * 50;
                track.style.transform = `translateX(${Math.max(-50, Math.min(0, percent))}%)`;
            }

            function onPointerUp(event) {
                if (!dragging || event.pointerId !== activePointerId) return;
                dragging = false;
                track.style.transition = "";
                const dx = event.clientX - startX;
                if (isHorizontal && Math.abs(dx) > 48) {
                    switchAuthTab(dx < 0 ? "register" : "login");
                } else {
                    switchAuthTab(track.dataset.activeTab === "register" ? "register" : "login");
                }
                activePointerId = null;
            }

            slider.addEventListener("pointerdown", onPointerDown);
            slider.addEventListener("pointermove", onPointerMove, { passive: false });
            slider.addEventListener("pointerup", onPointerUp);
            slider.addEventListener("pointercancel", onPointerUp);
        })();
    </script>
